name: Live Auto M3U

on:
  schedule:
    # 每 6 小时的第 15 分钟运行一次
    - cron: '15 */6 * * *'
  workflow_dispatch: # 允许手动点击运行

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  iptv-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须有写入权限才能推送文件到仓库
    env:
      TZ: Asia/Shanghai

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 执行维护脚本
        run: |
          # 确保必要目录存在
          mkdir -p down files list
          # 清理上一次运行残留的临时文件，但不删 files 目录（由脚本重新下载覆盖）
          rm -f down/*
          
          # 赋予权限并执行脚本
          chmod +x ./list/update_live.sh
          ./list/update_live.sh

      - name: 3. 清理冗余临时文件
        # 为了让 files 和 down 目录更整洁，只保留你需要的 txt/m3u 文件
        run: |
          find files/ -type f ! -name "*.m3u" ! -name "*.txt" -delete 2>/dev/null || true
          find down/ -type f ! -name "*.m3u" ! -name "*.txt" -delete 2>/dev/null || true

      - name: 4. 同步至仓库
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 【核心关键】：将 live.m3u 以及 files/ 和 down/ 目录下的所有 m3u 和 txt 文件都加入 Git
          git add live.m3u
          git add files/*.m3u files/*.txt 2>/dev/null || true
          git add down/*.m3u down/*.txt 2>/dev/null || true
          
          # 检查是否有文件变化
          if git diff --cached --quiet; then
            echo "没有检测到任何内容变化，跳过提交。"
            exit 0
          fi

          # 提交变更
          git commit -m "📺 自动更新: $(date '+%Y-%m-%d %H:%M') (包含原始 files 镜像)"
          
          # 先拉取远程改动，防止多人协作或冲突
          git pull --rebase origin main
          
          # 推送到 GitHub 仓库
          git push origin main
