name: Live Builder

on:
  push:
  schedule:
    - cron: '0 */6 * * *'   # 每6小时构建一次
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y ffmpeg jq curl

      - name: Run live.sh
        run: bash list/live.sh

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add live.m3u down/ files/
          git commit -m "auto build live.m3u" || echo "no changes"
          git push
