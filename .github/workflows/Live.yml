name: Live Auto M3U

on:
  schedule:
    # 每 6 小时的第 15 分钟运行 (例如 00:15, 06:15, 12:15, 18:15 UTC)
    - cron: '15 */6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  iptv-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Shanghai

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 执行维护脚本
        id: run_script
        run: |
          # 清理临时目录并运行脚本
          rm -rf down/*
          mkdir -p down files
          chmod +x ./list/update_live.sh
          ./list/update_live.sh

      - name: 3. 终端状态汇总 (Actions 日志可见)
        run: |
          # 在 GitHub Action 运行日志中打印简单的统计信息
          if [ -f "live.m3u" ]; then
            COUNT=$(grep -c "^https\?://" live.m3u)
            echo "✅ 成功生成 live.m3u, 有效频道数量: $COUNT"
          else
            echo "❌ 未找到 live.m3u 文件"
          fi

      - name: 4. 同步至仓库
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Ando-Bot"
          
          # 1. 暂存所有你关心的文件（包括 live.m3u 和处理后的目录）
          # 如果你想保留 files 和 down 里的结果，就把它们也加上
          git add live.m3u files/*.m3u files/*.txt down/*.m3u down/*.txt 2>/dev/null || true
          
          # 2. 检查是否有内容变更
          if git diff --cached --quiet; then
            echo "没有变化，跳过提交。"
          else
            git commit -m "📺 IPTV Update: $(date '+%Y-%m-%d %H:%M')"
            
            # 【注意】先 Pull 再 Push，且在 Clean 之前处理
            git pull --rebase -X theirs origin main
            
            # 只有在推送前，如果你一定要清理本地环境，才执行 clean
            # 但其实 Actions 运行完会自动销毁容器，通常不需要手动 clean
            git push origin main
          fi
