name: Live Auto M3U

on:
  schedule:
    # 每 6 小时的第 15 分钟运行 (例如 00:15, 06:15, 12:15, 18:15 UTC)
    - cron: '15 */6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  iptv-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Shanghai

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 执行维护脚本
        id: run_script
        run: |
          # 清理临时目录并运行脚本
          rm -rf down/*
          mkdir -p down files
          chmod +x ./list/update_live.sh
          ./list/update_live.sh

      - name: 3. 终端状态汇总 (Actions 日志可见)
        run: |
          # 在 GitHub Action 运行日志中打印简单的统计信息
          if [ -f "live.m3u" ]; then
            COUNT=$(grep -c "^https\?://" live.m3u)
            echo "✅ 成功生成 live.m3u, 有效频道数量: $COUNT"
          else
            echo "❌ 未找到 live.m3u 文件"
          fi

      -- name: 4. 同步至仓库
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Ando-Bot"
          
          # 【核心修改点】告诉 Git 你要提交哪些内容
          # 这里不仅添加 live.m3u，还添加 files 和 down 文件夹下的所有内容
          git add live.m3u files/* down/* 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "没有变化，跳过提交。"
          else
            git commit -m "📺 IPTV Update: $(date '+%Y-%m-%d %H:%M')"
            
            # 先同步远程改动，防止推送失败
            git pull --rebase -X theirs origin main
            
            # 推送
            git push origin main
          fi
