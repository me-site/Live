name: IPTV Auto Update

on:
  schedule:
    # 每 6 小时自动运行一次 (UTC 时间)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # 允许你在 Actions 页面手动点击运行

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Shell Environment
        run: |
          chmod +x list/update_live.sh

      - name: Run Update Script
        run: |
          ./list/update_live.sh

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add live.m3u down/ files/
          git commit -m "Auto Update IPTV: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push
