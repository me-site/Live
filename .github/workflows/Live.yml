name: Auto Live M3U

on:
  schedule:
    - cron: '0 */6 * * *' # 每6小时运行一次
  workflow_dispatch:      # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Environment
        run: |
          # 注意这里修改了路径，指向 list 目录下的脚本
          chmod +x list/update_live.sh
          # 创建目录，确保脚本运行环境正常
          mkdir -p files down

      - name: Run Update Script
        run: ./list/update_live.sh

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 包含根目录下的 live.m3u 以及 down 目录的变化
          git add .
          git commit -m "Auto Update live.m3u $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
