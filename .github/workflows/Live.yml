name: Live Auto M3U

on:
  schedule:
    # 每 6 小时的第 15 分钟运行 (北京时间: 06:15, 12:15, 18:15, 00:15)
    - cron: '15 */6 * * *'
  workflow_dispatch: # 允许手动点击运行

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  iptv-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 关键：必须赋予写入权限，否则 push 会报错
    env:
      TZ: Asia/Shanghai

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史，避免 rebase 冲突

      - name: 2. 执行维护脚本
        id: run_script
        run: |
          # 确保目录存在并清理旧的中间文件
          mkdir -p down files list
          rm -f down/* # 赋予脚本执行权限并运行
          chmod +x ./list/update_live.sh
          ./list/update_live.sh

      - name: 3. 终端状态汇总
        run: |
          if [ -f "live.m3u" ]; then
            COUNT=$(grep -c "^https\?://" live.m3u)
            echo "✅ 成功生成 live.m3u, 有效频道数量: $COUNT"
          else
            echo "❌ 未找到 live.m3u 文件"
          fi

      - name: 4. 同步至仓库
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 1. 添加所有生成的文件到暂存区
          # 包括最终的 live.m3u，以及原始目录 files 和处理目录 down
          git add live.m3u files/* down/* 2>/dev/null || true
          
          # 2. 检查是否有变动，无变动则退出
          if git diff --cached --quiet; then
            echo "内容没有变化，跳过提交。"
            exit 0
          fi

          # 3. 提交并拉取远程改动以防冲突
          git commit -m "📺 IPTV Update: $(date '+%Y-%m-%d %H:%M')"
          
          # 使用 --rebase 保持提交历史整洁
          git pull --rebase origin main
          
          # 4. 推送到仓库
          git push origin main
