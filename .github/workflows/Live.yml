name: IPTV Studio 自动化直播源

on:
  schedule:
    # 每天北京时间 07:15 运行 (对应 UTC 23:15)
    - cron: '15 23 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  iptv-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Shanghai

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 执行维护脚本
        id: run_script
        run: |
          # 清理临时目录并运行脚本
          rm -rf down/*
          mkdir -p down files
          chmod +x ./list/update_iptv.sh
          ./list/update_iptv.sh

      - name: 3. 终端状态汇总 (Actions 日志可见)
        run: |
          # 在 GitHub Action 运行日志中打印简单的统计信息
          if [ -f "live.m3u" ]; then
            COUNT=$(grep -c "^https\?://" live.m3u)
            echo "✅ 成功生成 live.m3u, 有效频道数量: $COUNT"
          else
            echo "❌ 未找到 live.m3u 文件"
          fi

      - name: 4. 同步至仓库
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Ando-Bot"
          
          # 1. 暂存目标文件
          git add live.m3u
          
          # 2. 检查是否有内容变更
          if git diff --cached --quiet; then
            echo "没有变化，跳过提交。"
          else
            git commit -m "📺 IPTV Update (live.m3u): $(date '+%Y-%m-%d %H:%M')"
            
            # 【核心修复】强制重置并清理
            # 这一步会强制让工作区回到刚刚 commit 的状态，抹除一切“unstaged changes”
            git reset --hard HEAD
            # 清理所有未追踪的杂物（-x 连同忽略文件一起删）
            git clean -dfx
            
            # 3. 此时工作区绝对干净，执行同步
            git pull --rebase -X theirs origin main
            git push origin main
          fi
